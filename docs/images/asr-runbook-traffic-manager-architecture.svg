<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #486581; }
      .box { fill: #ffffff; stroke: #2f80ed; stroke-width: 2; rx: 14; }
      .box2 { fill: #f0f7ff; stroke: #2f80ed; stroke-width: 2; rx: 14; }
      .dr { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 14; }
      .mgmt { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2; rx: 14; }
      .text { font: 600 16px Arial, sans-serif; fill: #102a43; }
      .small { font: 400 13px Arial, sans-serif; fill: #334e68; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #52606d; }
      .arrow { stroke: #334e68; stroke-width: 2.2; marker-end: url(#arrowhead); fill: none; }
      .dash { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrowhead); fill: none; }
      .orange { stroke: #f97316; }
      .blue { stroke: #2f80ed; }
      .green { stroke: #0f9f6e; }
      .section { font: 700 18px Arial, sans-serif; fill: #1f2937; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334e68" />
    </marker>
  </defs>

  <rect width="1280" height="820" fill="#f8fafc" />
  <text x="40" y="48" class="title">Azure ASR Runbook + Inventory + Traffic Manager DR Example</text>
  <text x="40" y="76" class="subtitle">Korea Central primary Tomcat AP to Japan East DR, automated by Azure Automation Runbook and inventory-driven shell scripts</text>

  <rect x="40" y="110" width="1180" height="80" class="mgmt" />
  <text x="70" y="140" class="section">User Access Layer</text>
  <rect x="270" y="128" width="210" height="44" class="box2" />
  <text x="295" y="155" class="text">User PC / Browser</text>
  <rect x="620" y="128" width="260" height="44" class="box2" />
  <text x="648" y="148" class="text">Traffic Manager DNS</text>
  <text x="650" y="165" class="tiny">Priority routing, HTTP probe :8080</text>
  <path d="M480 150 L620 150" class="arrow" />

  <rect x="40" y="230" width="550" height="430" class="box2" />
  <text x="70" y="262" class="section">Primary Region: Korea Central</text>
  <rect x="90" y="300" width="210" height="74" class="box" />
  <text x="114" y="326" class="text">Public IP / FQDN</text>
  <text x="112" y="348" class="small">pip-prd-ap-tomcat01</text>
  <text x="112" y="366" class="tiny">Traffic Manager endpoint #1</text>

  <rect x="340" y="290" width="210" height="104" class="box" />
  <text x="362" y="316" class="text">AP VM: Tomcat</text>
  <text x="360" y="338" class="small">vm-prd-ap-tomcat01</text>
  <text x="360" y="356" class="tiny">Private IP: 10.10.10.10</text>
  <text x="360" y="374" class="tiny">Port: 8080 / tomcat-test</text>

  <rect x="340" y="450" width="210" height="92" class="box" />
  <text x="362" y="478" class="text">Managed MySQL</text>
  <text x="360" y="500" class="small">Flexible Server</text>
  <text x="360" y="518" class="tiny">mysql-asrtest01-krc</text>

  <rect x="90" y="450" width="210" height="92" class="box" />
  <text x="112" y="478" class="text">NSG</text>
  <text x="110" y="500" class="small">SSH 22 / Tomcat 8080</text>
  <text x="110" y="518" class="tiny">allowed_admin_cidr</text>

  <path d="M750 172 C750 215 210 225 195 300" class="arrow blue" />
  <path d="M300 337 L340 337" class="arrow" />
  <path d="M445 394 L445 450" class="arrow" />
  <path d="M300 496 L340 496" class="dash" />

  <rect x="690" y="230" width="530" height="430" class="dr" />
  <text x="720" y="262" class="section">DR Region: Japan East</text>
  <rect x="735" y="300" width="210" height="74" class="dr" />
  <text x="758" y="326" class="text">DR Public IP / DNS</text>
  <text x="756" y="348" class="small">Created after ASR failover</text>
  <text x="756" y="366" class="tiny">Traffic Manager endpoint #2</text>

  <rect x="980" y="290" width="200" height="104" class="dr" />
  <text x="1003" y="316" class="text">DR AP VM</text>
  <text x="1001" y="338" class="small">vm-dr-ap-tomcat01</text>
  <text x="1001" y="356" class="tiny">Private IP: 10.20.10.10</text>
  <text x="1001" y="374" class="tiny">Tomcat started by Runbook</text>

  <rect x="980" y="450" width="200" height="92" class="dr" />
  <text x="1003" y="478" class="text">DR MySQL Plan</text>
  <text x="1001" y="500" class="small">Geo-restore / replica</text>
  <text x="1001" y="518" class="tiny">Not ASR-replicated</text>

  <path d="M750 172 C770 220 830 240 840 300" class="dash orange" />
  <path d="M945 337 L980 337" class="arrow" />
  <path d="M1080 394 L1080 450" class="arrow" />

  <rect x="40" y="690" width="1180" height="96" class="mgmt" />
  <text x="70" y="722" class="section">Automation Control Plane</text>
  <rect x="285" y="712" width="180" height="48" class="box" />
  <text x="307" y="733" class="text">ASR Recovery Plan</text>
  <text x="307" y="751" class="tiny">Failover orchestration</text>

  <rect x="520" y="712" width="200" height="48" class="box" />
  <text x="543" y="733" class="text">Azure Runbook</text>
  <text x="543" y="751" class="tiny">Invoke-ASR-Inventory-DR.ps1</text>

  <rect x="775" y="712" width="190" height="48" class="box" />
  <text x="798" y="733" class="text">Inventory CSV</text>
  <text x="798" y="751" class="tiny">Priority, script, health URL</text>

  <rect x="1010" y="712" width="170" height="48" class="box" />
  <text x="1030" y="733" class="text">Shell Scripts</text>
  <text x="1030" y="751" class="tiny">start_tomcat.sh</text>

  <path d="M465 736 L520 736" class="arrow green" />
  <path d="M720 736 L775 736" class="arrow green" />
  <path d="M965 736 L1010 736" class="arrow green" />
  <path d="M1095 712 C1120 645 1080 560 1080 542" class="dash green" />
  <path d="M620 712 C610 600 735 420 980 350" class="dash green" />

  <text x="70" y="616" class="small">Run Command deployment: user PC does not scp to private IP. Shell/JSP files are pulled from GitHub inside the VM by az vm run-command.</text>
</svg>
